version: "3.9"

services:
  gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 1g
    restart: unless-stopped

  console:
    build:
      context: ../../services/console
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 1536m
    restart: unless-stopped

  operation:
    build:
      context: ../../services/operation
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 1g
    restart: unless-stopped

  lab:
    build:
      context: ../../services/lab
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 2g
    restart: unless-stopped

  inference:
    build:
      context: ../../services/inference
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 1536m
    restart: unless-stopped

  fastlabel:
    build:
      context: ../../services/fastlabel
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 1536m
    restart: unless-stopped

  scorecard:
    build:
      context: ../../services/scorecard
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aiplatform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=AiPlatform2026Pg!
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=aiplatform
      - MINIO_SECRET_KEY=AiPlatform2026Minio!
      - NATS_URL=${NATS_URL}
    mem_limit: 1536m
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.0
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://aiplatform:AiPlatform2026Pg!@${POSTGRES_HOST}:5432/mlflow
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://mlflow/artifacts
      - AWS_ACCESS_KEY_ID=aiplatform
      - AWS_SECRET_ACCESS_KEY=AiPlatform2026Minio!
      - AWS_ENDPOINT_URL=${MINIO_ENDPOINT}
      - MLFLOW_S3_ENDPOINT_URL=${MINIO_ENDPOINT}
    mem_limit: 1g
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro
    mem_limit: 320m
    restart: unless-stopped
    depends_on:
      - gateway
