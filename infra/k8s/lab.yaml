apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-config
  namespace: ai-platform-core
data:
  SPRING_PROFILES_ACTIVE: "prod"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "aiplatform"
  POSTGRES_USER: "aiplatform"
  REDIS_PORT: "6379"
  MINIO_ACCESS_KEY: "aiplatform"
---
apiVersion: v1
kind: Secret
metadata:
  name: lab-secret
  namespace: ai-platform-core
type: Opaque
stringData:
  POSTGRES_PASSWORD: "AiPlatform2026Pg!"
  MINIO_SECRET_KEY: "AiPlatform2026Minio!"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab
  namespace: ai-platform-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab
  template:
    metadata:
      labels:
        app: lab
    spec:
      containers:
        - name: lab
          image: ai-platform/lab:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: lab-config
            - secretRef:
                name: lab-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: lab
  namespace: ai-platform-core
spec:
  selector:
    app: lab
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
