apiVersion: v1
kind: ConfigMap
metadata:
  name: console-config
  namespace: ai-platform-core
data:
  SPRING_PROFILES_ACTIVE: "prod"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "aiplatform"
  POSTGRES_USER: "aiplatform"
  REDIS_PORT: "6379"
  MINIO_ACCESS_KEY: "aiplatform"
---
apiVersion: v1
kind: Secret
metadata:
  name: console-secret
  namespace: ai-platform-core
type: Opaque
stringData:
  POSTGRES_PASSWORD: "AiPlatform2026Pg!"
  MINIO_SECRET_KEY: "AiPlatform2026Minio!"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: ai-platform-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      containers:
        - name: console
          image: ai-platform/console:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: console-config
            - secretRef:
                name: console-secret
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: ai-platform-core
spec:
  selector:
    app: console
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
