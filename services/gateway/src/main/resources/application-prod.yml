server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: console-service
          uri: http://console:8081
          predicates:
            - Path=/api/console/**
          filters:
            - StripPrefix=2
        - id: operation-service
          uri: http://operation:8082
          predicates:
            - Path=/api/operation/**
          filters:
            - StripPrefix=2
        - id: lab-service
          uri: http://10.0.0.3:8083
          predicates:
            - Path=/api/lab/**
          filters:
            - StripPrefix=1
        - id: inference-service
          uri: http://10.0.0.3:8084
          predicates:
            - Path=/api/inference/**
          filters:
            - StripPrefix=1
        - id: fastlabel-service
          uri: http://10.0.0.3:8085
          predicates:
            - Path=/api/fastlabel/**
          filters:
            - StripPrefix=1
        - id: scorecard-service
          uri: http://10.0.0.3:8086
          predicates:
            - Path=/api/scorecard/**
          filters:
            - StripPrefix=1

jwt:
  secret: AiPlatformJwtSecretKey2024ForProductionUseMustBe256Bits!!
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.aiplatform.gateway: INFO
