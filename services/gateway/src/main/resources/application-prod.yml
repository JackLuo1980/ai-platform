server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: http://console:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: console-service
          uri: http://console:8081
          predicates:
            - Path=/api/console/**
          filters:
            - StripPrefix=2
        - id: operation-service
          uri: http://operation:8082
          predicates:
            - Path=/api/operation/**
          filters:
            - StripPrefix=2
        - id: lab-service
          uri: http://10.0.0.3:8083
          predicates:
            - Path=/api/v1/lab/**
          filters:
            - StripPrefix=2
        - id: inference-service
          uri: http://10.0.0.3:8084
          predicates:
            - Path=/api/v1/inference/**
        - id: fastlabel-service
          uri: http://10.0.0.3:8085
          predicates:
            - Path=/api/v1/fastlabel/**
        - id: audit-logs-service
          uri: http://console:8081
          predicates:
            - Path=/api/v1/audit-logs/**
          filters:
            - StripPrefix=2
        - id: messages-service
          uri: http://console:8081
          predicates:
            - Path=/api/v1/messages/**
          filters:
            - StripPrefix=2
        - id: console-v1-service
          uri: http://console:8081
          predicates:
            - Path=/api/v1/users/**,/api/v1/roles/**,/api/v1/tenants/**,/api/v1/projects/**
          filters:
            - StripPrefix=2
        - id: resource-quotas-service
          uri: http://operation:8082
          predicates:
            - Path=/api/v1/resource-quotas/**
          filters:
            - StripPrefix=2
        - id: scorecard-service
          uri: http://10.0.0.3:8086
          predicates:
            - Path=/api/v1/scorecard/**
          filters:


jwt:
  secret: AiPlatformJwtSecretKey2024ForProductionUseMustBe256Bits!!
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.aiplatform.gateway: INFO
