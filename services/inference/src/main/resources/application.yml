server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inference_db
    username: inference_admin
    password: ${DB_PASSWORD:inference_pass}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ai-platform-models

nats:
  url: nats://localhost:4222
  subject-prefix: ai-platform.inference

grpc:
  server:
    port: 9090

k8s:
  api-server-url: https://localhost:6443
  namespace: ai-inference
  token: ${K8S_TOKEN:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
