server:
  port: 8080

spring:
  application:
    name: scorecard-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aiplatform}
    username: ${DB_USER:aiplatform}
    password: ${DB_PASS:AiPlatform2026Pg!}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.aiplatform.scorecard: INFO
