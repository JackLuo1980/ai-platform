server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_platform
    username: ai_admin
    password: ai_admin_pass
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  global-config:
    db-config:
      table-prefix: 
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: ai-platform

mlflow:
  tracking-uri: ${MLFLOW_TRACKING_URI:http://localhost:5000}

docker:
  host: ${DOCKER_HOST:unix:///var/run/docker.sock}
  enabled: ${DOCKER_ENABLED:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.aiplatform.lab: DEBUG
